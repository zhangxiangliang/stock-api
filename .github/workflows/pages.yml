name: Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "src/**"
      - "scripts/build-browser.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build browser bundle
        run: npm run build:browser

      - name: Prepare site
        run: |
          rm -rf _site
          cp -R examples _site
          mkdir -p _site/stock-api-web-example/vendor
          cp dist/browser/stock-api.iife.min.js _site/stock-api-web-example/vendor/stock-api.iife.min.js
          cp dist/browser/stock-api.iife.min.js.map _site/stock-api-web-example/vendor/stock-api.iife.min.js.map

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
