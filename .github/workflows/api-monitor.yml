name: API Monitor

on:
  schedule:
    - cron: "33 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: api-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check APIs
        run: |
          node scripts/check-api-status.mjs
          echo "BADGE_VERSION=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_ENV"

      - name: Publish status
        run: |
          set -euo pipefail
          cp -R status /tmp/stock-api-status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin api-status >/dev/null 2>&1; then
            git fetch origin api-status
            git switch --detach origin/api-status
            rm -rf ./*
          else
            git switch --orphan api-status
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp -R /tmp/stock-api-status/* .
          git add .
          git commit -m "chore: update api status" || exit 0
          git push origin HEAD:api-status

      - name: Refresh README badge URLs
        run: |
          set -euo pipefail
          git fetch origin main
          git switch main
          git reset --hard origin/main
          node scripts/update-readme-badge-versions.mjs "$BADGE_VERSION"
          git add README.md README.EN.md
          git commit -m "chore: refresh api status badges" || exit 0
          git push origin main
