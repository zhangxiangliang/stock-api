<svg xmlns="http://www.w3.org/2000/svg" width="132" height="20" role="img" aria-label="api status: 3/3 up">
  <title>api status: 3/3 up</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="132" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="80" height="20" fill="#555"/>
    <rect x="80" width="52" height="20" fill="#4c1"/>
    <rect width="132" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="400" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">api status</text>
    <text x="400" y="140" transform="scale(.1)" fill="#fff">api status</text>
    <text aria-hidden="true" x="1060" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">3/3 up</text>
    <text x="1060" y="140" transform="scale(.1)" fill="#fff">3/3 up</text>
