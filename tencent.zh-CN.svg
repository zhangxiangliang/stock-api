<svg xmlns="http://www.w3.org/2000/svg" width="80" height="20" role="img" aria-label="腾讯: 可用">
  <title>腾讯: 可用</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="80" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="40" height="20" fill="#555"/>
    <rect x="40" width="40" height="20" fill="#4c1"/>
    <rect width="80" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="200" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">腾讯</text>
    <text x="200" y="140" transform="scale(.1)" fill="#fff">腾讯</text>
    <text aria-hidden="true" x="600" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">可用</text>
    <text x="600" y="140" transform="scale(.1)" fill="#fff">可用</text>
  </g>
</svg>
