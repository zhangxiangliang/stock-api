  <link rel="icon" href="data:,">

  <!-- Lucide Icons -->

  <style>
    /* CSS Variables supporting live Up/Down theme changes */
    :root {
      --color-up: 239, 68, 68;      /* Default Red Up (239, 68, 68) */
      --color-down: 16, 185, 129;   /* Default Green Down (16, 185, 129) */
    }
    
    .text-up { color: rgb(var(--color-up)); }
    .text-down { color: rgb(var(--color-down)); }
    .bg-up { background-color: rgb(var(--color-up)); }
    .bg-down { background-color: rgb(var(--color-down)); }
    .border-up { border-color: rgb(var(--color-up)); }
    .border-down { border-color: rgb(var(--color-down)); }

    /* Custom scrollbar for absolute modern aesthetic */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.25);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.45);
    }

    /* Glow animations on price updates */
    @keyframes glow-up {
      0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.5); background-color: rgba(239, 68, 68, 0.15); }
      100% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); background-color: transparent; }
    }
    @keyframes glow-down {
      0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.5); background-color: rgba(16, 185, 129, 0.15); }
      100% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); background-color: transparent; }
    }
    .flash-up {
      animation: glow-up 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .flash-down {
      animation: glow-down 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>

    // Simulated historical data cache to prevent resetting charts
    const refreshIntervalStorageKey = 'sa_refresh_interval_seconds_v2';
    const colorRuleStorageKey = 'sa_color_rule_v2';
    const watchlistStorageKey = 'sa_watchlist_codes_v2';
    const selectedCodeStorageKey = 'sa_selected_code_v2';
    const periodStorageKey = 'sa_active_period_v2';
    const historicalCache = {};
    const pendingKlineRequests = {};

    function createWatchStock(code, quote = {}) {
      const normalizedCode = String(code || '').trim().toUpperCase();
      const now = Number(quote.now || 0);
      const yesterday = Number(quote.yesterday || 0);
      const percent = Number.isFinite(Number(quote.percent))
        ? Number(quote.percent) * 100
        : yesterday
          ? ((now - yesterday) / yesterday) * 100
          : 0;

      return {
        code: normalizedCode,
        nameZh: quote.name || normalizedCode,
        nameEn: quote.name || normalizedCode,
        price: now,
        change: Number.isFinite(percent) ? percent : 0,
        prevClose: yesterday || now || 0,
        source: quote.source || 'auto',
        lastResponse: JSON.stringify(quote || {}, null, 2)
      };
    }

    function applyQuoteToStock(stock, quote) {
      const nextStock = createWatchStock(stock.code, quote);
      Object.assign(stock, nextStock);
      return stock;
    }

    function describeError(error) {
      if (error instanceof Error) return error.message;
      return String(error || 'Unknown error');
    }

    async function traceRequest(message, input, request) {
      const startTime = performance.now();
      try {
        const result = await request();
        logTerminal(message, '200 OK', Math.round(performance.now() - startTime), '', {
          input,
          response: result
        });
        return result;
      } catch (error) {
        logTerminal(message, 'FAILED', Math.round(performance.now() - startTime), describeError(error), {
          input,
          error: describeError(error)
        });
        throw error;
      }
    }

    async function fetchQuote(code) {
      const quote = await traceRequest(
        `StockApi.stocks.auto.getStock(${code})`,
        { selectedCode: code },
        () => stocks.auto.getStock(code)
      );
      return createWatchStock(code, quote);
    }

    async function refreshStock(code) {
      const stock = appState.watchlist.find(item => item.code === code);
      if (!stock) return null;
      const quote = await traceRequest(
        `StockApi.stocks.auto.getStock(${code})`,
        { selectedCode: code },
        () => stocks.auto.getStock(code)
      );
      return applyQuoteToStock(stock, quote);
    }

    async function refreshWatchlist() {
      const results = await Promise.allSettled(
        appState.watchlist.map(stock => traceRequest(
          `StockApi.stocks.auto.getStock(${stock.code})`,
          { selectedCode: stock.code },
          () => stocks.auto.getStock(stock.code)
        ))
      );

      results.forEach((result, index) => {
        if (result.status === 'fulfilled') {
          applyQuoteToStock(appState.watchlist[index], result.value);
        }
      });

      const failedCount = results.filter(result => result.status === 'rejected').length;
      appState.dataSourceError = failedCount > 0 ? i18n[appState.lang].data_source_error : '';
      render();
    }

    function toApiPeriod(period) {
      if (period === 'Week') return 'week';
      if (period === 'Month') return 'month';
      return 'day';
    }

    function toChartRow(row) {
      return {
        time: new Date(`${row.date}T00:00:00`),
        open: Number(row.open),
        high: Number(row.high),
        low: Number(row.low),
        close: Number(row.close),
        volume: Number(row.volume || 0)
      };
    }

    async function fetchKlineData(symbol, period, count = 80) {
      const cacheKey = `${symbol}_${period}`;
      if (historicalCache[cacheKey]) {
        return historicalCache[cacheKey];
      }

      if (pendingKlineRequests[cacheKey]) {
        return pendingKlineRequests[cacheKey];
      }

      const apiPeriod = toApiPeriod(period);
      pendingKlineRequests[cacheKey] = (async () => {
        const rows = await traceRequest(
          `StockApi.stocks.auto.getKlines(${symbol}, ${apiPeriod}, ${count})`,
          { selectedCode: symbol, period: apiPeriod, count },
          () => stocks.auto.getKlines(symbol, { count, period: apiPeriod })
        );

        if (!rows.length) return [];

        const data = rows.map(toChartRow).filter(row =>
          Number.isFinite(row.open) &&
          Number.isFinite(row.high) &&
          Number.isFinite(row.low) &&
          Number.isFinite(row.close)
        );

        calculateMAs(data);
        historicalCache[cacheKey] = data;
        return data;
      })();

      try {
        return await pendingKlineRequests[cacheKey];
      } finally {
        delete pendingKlineRequests[cacheKey];
      }
    }

    function normalizeVersion(version) {
      if (version === null || version === undefined) return '';
      const rawVersion = String(version).trim();
      if (!rawVersion) return '';
      return rawVersion.startsWith('v') ? rawVersion : `v${rawVersion}`;
    }

    function readPathValue(source, path) {
      return path.split('.').reduce((value, key) => {
        if (value && Object.prototype.hasOwnProperty.call(value, key)) {
          return value[key];
        }
        return undefined;
      }, source);
    }

    function applyAppVersion(version) {
      const normalizedVersion = normalizeVersion(version) || appMeta.fallbackVersion;
      const badge = document.getElementById('app-version-badge');
      if (badge) {
        badge.innerText = normalizedVersion;
        badge.title = `Version ${normalizedVersion}`;
      }
      document.title = `${appMeta.name} ${normalizedVersion} - ${appMeta.titleSuffix}`;
    }

    async function fetchVersionFromSource(source) {
      const response = await fetch(source.url, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Version source unavailable: ${source.url}`);
      }

      const payload = await response.json();
      return normalizeVersion(readPathValue(payload, source.path || 'version'));
    }

    function getGitHubRepoFromHeaderLink() {
      const githubLink = document.querySelector('a[href*="github.com"]');
      if (!githubLink) return '';

      try {
        const url = new URL(githubLink.href);
        const pathParts = url.pathname.split('/').filter(Boolean);
        if (url.hostname !== 'github.com' || pathParts.length < 2) return '';
        return `${pathParts[0]}/${pathParts[1]}`;
      } catch (error) {
        return '';
      }
    }

    async function fetchGitHubReleaseVersion() {
      const repo = getGitHubRepoFromHeaderLink();
      if (!repo) return '';

      const endpoints = [
        `https://api.github.com/repos/${repo}/releases/latest`,
        `https://api.github.com/repos/${repo}/tags`
      ];

      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, { cache: 'no-store' });
          if (!response.ok) continue;
          const payload = await response.json();
          const version = Array.isArray(payload) ? payload[0]?.name : payload.tag_name;
          const normalizedVersion = normalizeVersion(version);
          if (normalizedVersion) return normalizedVersion;
        } catch (error) {
          // Keep trying other version sources.
        }
      }

      return '';
    }

    async function initAppVersion() {
      applyAppVersion(appMeta.fallbackVersion);

      for (const source of appMeta.versionSources) {
        try {
          const version = await fetchVersionFromSource(source);
          if (version) {
            applyAppVersion(version);
            return;
          }
        } catch (error) {
          // Missing local version files are expected when opening this HTML directly.
        }
      }

      const githubVersion = await fetchGitHubReleaseVersion();
      if (githubVersion) {
        applyAppVersion(githubVersion);
      }
    }

    // Generate incredibly high-fidelity candlestick data procedurally
    function generateHistoricalData(symbol, period, count = 120) {
      const cacheKey = `${symbol}_${period}`;
      if (historicalCache[cacheKey]) {
        return historicalCache[cacheKey];
      }

      // Volatility profiles
      let volatility = 0.015;
      let basePrice = 50;
      let drift = 0.0002; // general growth drift

      if (symbol.startsWith('SH') || symbol.startsWith('SZ')) {
        volatility = 0.012;
        basePrice = symbol === 'SH600519' ? 1600 : 40;
      } else if (symbol.startsWith('HK')) {
        volatility = 0.018;
        basePrice = 200;
      } else if (symbol.startsWith('US')) {
        volatility = 0.022;
        basePrice = symbol.includes('NVDA') ? 800 : 150;
      }

      // Seed based on string hash
      let seed = 0;
      for (let i = 0; i < symbol.length; i++) {
        seed += symbol.charCodeAt(i);
      }

      function pseudoRandom() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
      }

      const data = [];
      let currentClose = basePrice;
      let now = new Date();

      // Step back in time
      for (let i = count; i > 0; i--) {
        let date = new Date(now.getTime());
        if (period === '1m') date.setMinutes(now.getMinutes() - i);
        else if (period === '5m') date.setMinutes(now.getMinutes() - i * 5);
        else if (period === 'Week') date.setDate(now.getDate() - i * 7);
        else date.setDate(now.getDate() - i); // Daily default

        // Skip weekends for daily and weekly
        if ((period === 'Day' || period === 'Week') && (date.getDay() === 0 || date.getDay() === 6)) {
          continue;
        }

        // Random walk
        let changePercent = (pseudoRandom() - 0.49) * volatility + drift;
        let open = currentClose;
        let close = open * (1 + changePercent);
        let high = Math.max(open, close) * (1 + pseudoRandom() * volatility * 0.4);
        let low = Math.min(open, close) * (1 - pseudoRandom() * volatility * 0.4);
        let volume = Math.floor((pseudoRandom() * 100000 + 50000) * (basePrice / close));

        data.push({
          time: date,
          open: parseFloat(open.toFixed(2)),
          high: parseFloat(high.toFixed(2)),
          low: parseFloat(low.toFixed(2)),
          close: parseFloat(close.toFixed(2)),
          volume: volume
        });

        currentClose = close;
      }

      // Calculate simple moving averages (MAs)
      calculateMAs(data);

      historicalCache[cacheKey] = data;
      return data;
    }

    function calculateMAs(data) {
      for (let i = 0; i < data.length; i++) {
        data[i].ma5 = getMA(data, i, 5);
        data[i].ma10 = getMA(data, i, 10);
        data[i].ma20 = getMA(data, i, 20);
      }
    }

    // Mathematical MA formula
    function getMA(data, index, period) {
      if (index < period - 1) return null;
      let sum = 0;
      for (let i = 0; i < period; i++) {
        sum += data[index - i].close;
      }
      return parseFloat((sum / period).toFixed(2));
    }

    // Set Up Global CSS variable colors according to selected rule
    function updateColors() {
      const isAsia = appState.colorRule === 'asia';
      const root = document.documentElement;
      if (isAsia) {
        // Red up, Green down (China style)
        root.style.setProperty('--color-up', '239, 68, 68');     // Red
        root.style.setProperty('--color-down', '16, 185, 129');  // Green
      } else {
        // Green up, Red down (International)
        root.style.setProperty('--color-up', '16, 185, 129');    // Green
        root.style.setProperty('--color-down', '239, 68, 68');   // Red
      }
    }

    // Initialize LocalStorage parameters
    function normalizeRefreshInterval(seconds) {
      if (seconds === null || seconds === undefined || seconds === '') return 30;
      const numericSeconds = Number(seconds);
      if (!Number.isFinite(numericSeconds)) return 30;
      return Math.max(10, Math.round(numericSeconds));
    }

    function normalizePeriod(period) {
      return ['Day', 'Week', 'Month'].includes(period) ? period : 'Day';
    }

    function normalizeWatchlistCodes(value) {
      if (!Array.isArray(value)) return [];

      const uniqueCodes = [];
      value.forEach(code => {
        const normalizedCode = normalizeStockCode(code);
        if (normalizedCode && !uniqueCodes.includes(normalizedCode)) {
          uniqueCodes.push(normalizedCode);
        }
      });

      return uniqueCodes;
    }

    function readJsonStorage(key, fallback) {
      try {
        const rawValue = localStorage.getItem(key);
        return rawValue ? JSON.parse(rawValue) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function initPersistedState() {
      const savedCodes = normalizeWatchlistCodes(readJsonStorage(watchlistStorageKey, []));
      const savedSelectedCode = normalizeStockCode(localStorage.getItem(selectedCodeStorageKey));
      const savedPeriod = normalizePeriod(localStorage.getItem(periodStorageKey));

      if (savedCodes.length > 0) {
        appState.watchlist = savedCodes.map(code => createWatchStock(code));
      }

      if (savedSelectedCode) {
        appState.selectedStock = savedSelectedCode;
      }

      appState.activePeriod = savedPeriod;
    }

    function savePersistedState() {
      const codes = normalizeWatchlistCodes(appState.watchlist.map(stock => stock.code));
      localStorage.setItem(watchlistStorageKey, JSON.stringify(codes));
      localStorage.setItem(selectedCodeStorageKey, normalizeStockCode(appState.selectedStock));
      localStorage.setItem(periodStorageKey, normalizePeriod(appState.activePeriod));
    }

    function getDefaultWatchlist() {
      return [
        createWatchStock('SH510500'),
        createWatchStock('SH510300')
      ];
    }

    function resetExampleData() {
      localStorage.removeItem(watchlistStorageKey);
      localStorage.removeItem(selectedCodeStorageKey);
      localStorage.removeItem(periodStorageKey);
      localStorage.removeItem(colorRuleStorageKey);
      localStorage.removeItem(refreshIntervalStorageKey);

      appState.watchlist = getDefaultWatchlist();
      appState.selectedStock = 'SH510500';
      appState.activePeriod = 'Day';
      appState.colorRule = 'asia';
      appState.refreshInterval = 30000;
      appState.dataSourceError = '';

      saveSettings();
      savePersistedState();
      changeColorRule('asia', false);
      restartMarketSimulation();
      closeSettingsModal();
      showWatchlist();
      refreshWatchlist().catch(() => {});
    }

    function initSettings() {
      const savedTheme = localStorage.getItem('sa_theme') || 'dark';
      const savedRule = localStorage.getItem(colorRuleStorageKey) || 'asia';
      const savedLang = localStorage.getItem('sa_lang') || 'zh';
      const savedConsoleCollapsed = localStorage.getItem('sa_console_collapsed');
      const savedRefreshInterval = localStorage.getItem(refreshIntervalStorageKey);

      appState.theme = savedTheme;
      appState.colorRule = savedRule;
      appState.lang = savedLang;
      appState.refreshInterval = normalizeRefreshInterval(savedRefreshInterval) * 1000;
      appState.consoleCollapsed = savedConsoleCollapsed !== null
        ? savedConsoleCollapsed === 'true'
        : true;

      changeTheme(savedTheme, false);
      changeColorRule(savedRule, false);
      changeLanguage(savedLang, false);
    }

    // Save configuration utility
    function saveSettings() {
      localStorage.setItem('sa_theme', appState.theme);
      localStorage.setItem(colorRuleStorageKey, appState.colorRule);
      localStorage.setItem('sa_lang', appState.lang);
      localStorage.setItem('sa_console_collapsed', appState.consoleCollapsed);
      localStorage.setItem(refreshIntervalStorageKey, Math.round(appState.refreshInterval / 1000));
    }

      if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');

      } else {
        el.classList.add('hidden');
        if (chevron) chevron.classList.remove('rotate-180');

      const nextTheme = appState.theme === 'dark' ? 'light' : 'dark';
      changeTheme(nextTheme);
    }

    function changeColorRule(rule, save = true) {
      appState.colorRule = rule;

      const radioAsia = document.getElementById('radio-asia');
      const cardIntl = document.getElementById('color-rule-intl');

    // Language Switcher - Triggers UI updates
    function changeLanguage(lang, save = true) {
      appState.lang = lang;
      if (appState.dataSourceError) {
        appState.dataSourceError = i18n[lang].data_source_error;
      }
      
      const textMap = { 'zh': '简体中文', 'en': 'English' };

      if (label) label.innerText = textMap[lang];

      const checkZh = document.getElementById('check-zh');
      const checkEn = document.getElementById('check-en');
      if (checkZh && checkEn) {

          checkZh.classList.remove('hidden');
          checkEn.classList.add('hidden');
        } else {
          checkEn.classList.remove('hidden');
          checkZh.classList.add('hidden');
        }
      }

      if (save) saveSettings();
      render();
    }

    // Translate dynamic DOM values
    function translateDOM() {
      const dict = i18n[appState.lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) {
          if (el.tagName === 'INPUT') {
            el.placeholder = dict[key];
          } else if (key === 'subtitle_tag') {
            el.innerHTML = dict[key];
          } else {
            el.innerText = dict[key];
          }
        }
      });
    }

    function getSortedWatchlist() {
      const list = [...appState.watchlist];
      if (appState.sortKey === 'none') return list;

      list.sort((a, b) => {
        if (appState.sortKey === 'name') {
          const valA = appState.lang === 'zh' ? a.nameZh : a.nameEn;
          const valB = appState.lang === 'zh' ? b.nameZh : b.nameEn;
          return appState.sortDirection === 'asc'
            ? valA.localeCompare(valB, appState.lang === 'zh' ? 'zh' : 'en')
            : valB.localeCompare(valA, appState.lang === 'zh' ? 'zh' : 'en');
        }

        const valA = appState.sortKey === 'change' ? a.change : a.price;
        const valB = appState.sortKey === 'change' ? b.change : b.price;
        return appState.sortDirection === 'asc' ? valA - valB : valB - valA;
      });

      return list;
    }

    function setSort(key) {
      if (appState.sortKey === key) {
        appState.sortDirection = appState.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        appState.sortKey = key;
        appState.sortDirection = 'desc';
      }

      render();
    }

    function renderSortIcon(key) {
      if (appState.sortKey !== key) {
        return `
          <svg class="w-3 h-3 text-slate-400 dark:text-[#5f6a80] ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
          </svg>
        `;
      }

      return appState.sortDirection === 'asc'
        ? `<svg class="w-3 h-3 text-blue-500 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>`
        : `<svg class="w-3 h-3 text-blue-500 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>`;
    }

    function getPeriodLabel(period) {
      const dict = i18n[appState.lang];
      if (period === 'Week') return dict.period_week;
      if (period === 'Month') return dict.period_month;
      return dict.period_day;
    }

    function escapeLogText(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    let inspectIndex = -1;

    function logTerminal(message, status, latency, errorMsg = '', payload = null) {
      const timestamp = new Date().toLocaleTimeString();
      appState.logs.push({ timestamp, message, status, latency, errorMsg, payload });

      if (appState.logs.length > 100) {
        appState.logs.shift();
      }

      renderConsoleLogsOnly();
    }

    function isSuccessStatus(status) {
      return status === 200 ||
        status === '200 OK' ||
        String(status).startsWith('2');
    }

    function renderConsoleLogsOnly() {
      const consoleLog = document.getElementById('terminal-logs');
      if (!consoleLog) return;

      const countLabel = document.getElementById('console-log-count');
      if (countLabel) {
        countLabel.innerText = `(${appState.logs.length})`;
      }

      consoleLog.innerHTML = appState.logs.map((log, index) => {
        const statusColor = isSuccessStatus(log.status) ? 'text-green-400' : 'text-red-400';
        const errorText = log.errorMsg ? ` (${escapeLogText(log.errorMsg)})` : '';
        const latencyText = log.errorMsg ? '' : ` <span class="text-slate-400">(${Number(log.latency || 0)}ms)</span>`;

        return `
          <div onclick="openLogDetails(${index}, event)" class="py-1 px-2 hover:bg-slate-900/60 rounded cursor-pointer transition-colors border-b border-slate-900/30 last:border-0 flex justify-between items-center group">
            <span class="truncate pr-4">
              <span class="text-slate-500">[${escapeLogText(log.timestamp)}]</span>
              <span class="text-blue-400">${escapeLogText(log.message)}</span>
              <span class="text-slate-500"> -> </span>
              <span class="${statusColor}">${escapeLogText(log.status)}${errorText}</span>${latencyText}
            </span>
            <span class="text-[9px] bg-slate-800 text-slate-400 px-1 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity">Inspect</span>
          </div>
        `;
      }).join('');

      const wrapper = document.getElementById('terminal-logs-wrapper');
      if (wrapper && !appState.consoleCollapsed) {
        wrapper.scrollTop = wrapper.scrollHeight;
      }
    }

    function openLogDetails(index, event) {
      if (event) event.stopPropagation();
      const log = appState.logs[index];
      if (!log) return;

      inspectIndex = index;
      const statusEl = document.getElementById('inspect-status');
      const inputCode = document.getElementById('inspect-input-json');
      const responseCode = document.getElementById('inspect-response-json');
      const payload = log.payload || {};

      document.getElementById('inspect-route-info').innerText = log.message;
      statusEl.innerText = log.status;
      statusEl.className = `${isSuccessStatus(log.status) ? 'text-green-500' : 'text-red-500'} font-bold`;
      document.getElementById('inspect-latency').innerText = `${Number(log.latency || 0)} ms`;
      document.getElementById('inspect-time').innerText = log.timestamp;

      inputCode.innerText = JSON.stringify(payload.input ?? null, null, 2);
      responseCode.innerText = JSON.stringify(payload.response ?? payload.error ?? null, null, 2);

      document.getElementById('log-detail-modal').classList.remove('hidden');
    }

    function closeLogDetailModal() {
      document.getElementById('log-detail-modal').classList.add('hidden');
      inspectIndex = -1;
    }

    function copyInspectSection(id) {
      const codeArea = document.getElementById(id);
      if (!codeArea) return;

      const tempTextArea = document.createElement('textarea');
      tempTextArea.value = codeArea.innerText;
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      document.execCommand('copy');
      document.body.removeChild(tempTextArea);
    }

    function toggleConsole() {
      appState.consoleCollapsed = !appState.consoleCollapsed;
      saveSettings();

      const wrapper = document.getElementById('terminal-logs-wrapper');
      const chevron = document.getElementById('console-chevron');

      if (!wrapper || !chevron) return;

      if (appState.consoleCollapsed) {
        wrapper.classList.add('hidden');
        chevron.classList.remove('rotate-180');
      } else {
        wrapper.classList.remove('hidden');
        chevron.classList.add('rotate-180');
        renderConsoleLogsOnly();
        wrapper.scrollTop = wrapper.scrollHeight;
      }
    }

    function clearLogs(event) {
      if (event) event.stopPropagation();
      appState.logs = [];
      renderConsoleLogsOnly();
    }

    function renderConsoleComponentHTML() {
      const dict = i18n[appState.lang];
      return `
        <div class="border border-slate-200 dark:border-[#1f2635] rounded-xl overflow-hidden bg-white dark:bg-[#111520] shadow-lg font-mono">
          <div onclick="toggleConsole()" class="px-5 py-3.5 bg-slate-50 dark:bg-slate-900/40 flex justify-between items-center cursor-pointer select-none border-b border-slate-200 dark:border-[#1f2635] transition-colors hover:bg-slate-100 dark:hover:bg-slate-800/20">
            <div class="flex items-center space-x-2.5">
              <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
              </span>
              <span class="text-[11px] font-bold tracking-wider text-slate-600 dark:text-slate-300 uppercase">
                ${dict.console_title || 'Live Logs'}
                <span id="console-log-count">(${appState.logs.length})</span>
              </span>
            </div>
            <div class="flex items-center space-x-4">
              <button onclick="clearLogs(event)" class="p-1 text-slate-400 dark:text-[#5f6a80] hover:text-red-500 transition-colors" title="Clear logs">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
              </button>
              <svg id="console-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-slate-500 transition-transform duration-200 ${appState.consoleCollapsed ? '' : 'rotate-180'}"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </div>
          <div id="terminal-logs-wrapper" class="${appState.consoleCollapsed ? 'hidden' : ''} bg-[#04060b] p-4 text-[10px] leading-relaxed text-[#10b981] h-48 overflow-y-auto space-y-1">
            <div id="terminal-logs"></div>
          </div>
        </div>
      `;
    }

    let marketIntervalId = null;

    // Periodic real quote refresh.
    function startMarketSimulation() {
      if (marketIntervalId) return;

      marketIntervalId = setInterval(() => {
        refreshWatchlist().catch(() => {});
      }, appState.refreshInterval);
    }

    function restartMarketSimulation() {
      if (marketIntervalId) {
        clearInterval(marketIntervalId);
        marketIntervalId = null;
      }

      startMarketSimulation();
    }

    function triggerMarketToast(stock, isUp) {
      const toast = document.getElementById('market-toast');
      const iconBg = document.getElementById('toast-icon-bg');
      const icon = document.getElementById('toast-icon');
      const title = document.getElementById('toast-title');
      const desc = document.getElementById('toast-desc');
      const dict = i18n[appState.lang];

      title.innerText = dict.toast_title;
      desc.innerText = `${appState.lang === 'zh' ? stock.nameZh : stock.nameEn} ${isUp ? dict.toast_high : dict.toast_low} (${stock.price.toFixed(2)})`;

      if (isUp) {
        iconBg.className = "w-8 h-8 rounded-full flex items-center justify-center bg-red-500/10 text-red-400";
        icon.setAttribute('data-lucide', 'arrow-up-right');
      } else {
        iconBg.className = "w-8 h-8 rounded-full flex items-center justify-center bg-emerald-500/10 text-emerald-400";
        icon.setAttribute('data-lucide', 'arrow-down-left');
      }

      lucide.createIcons();

      toast.classList.remove('opacity-0', 'translate-y-20');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', 'translate-y-20');
      }, 3500);
    }

    function updateActiveDetailHeader(stock) {
      const detailTitleEl = document.getElementById('detail-stock-name');
      const detailPriceEl = document.getElementById('detail-stock-price');
      const detailChangeEl = document.getElementById('detail-stock-change');
      
      if (detailTitleEl && detailPriceEl && detailChangeEl) {
        detailTitleEl.innerText = appState.lang === 'zh' ? stock.nameZh : stock.nameEn;
        detailPriceEl.innerText = stock.price.toFixed(2);
        
        const isUp = stock.change >= 0;
        const colorClass = appState.colorRule === 'asia' 
          ? (isUp ? 'text-red-500' : 'text-emerald-500')
          : (isUp ? 'text-emerald-500' : 'text-red-500');
        
        detailChangeEl.innerText = (isUp ? '+' : '') + stock.change.toFixed(2) + '%';
        detailChangeEl.className = `text-lg font-extrabold font-mono tracking-tight ${colorClass}`;
      }
    }

    function appendRealtimeCandleTick(symbol, currentPrice) {
      const cacheKey = `${symbol}_${appState.activePeriod}`;
      const data = historicalCache[cacheKey];
      if (!data || data.length === 0) return;

      const lastCandle = data[data.length - 1];
      
      lastCandle.close = currentPrice;
      if (currentPrice > lastCandle.high) lastCandle.high = currentPrice;
      if (currentPrice < lastCandle.low) lastCandle.low = currentPrice;

      calculateMAs(data);
      drawChart();
    }

    let searchRequestToken = 0;

    // Handle Search Auto-Suggest and Adding Stocks
    function handleSearchInput(e) {
      const query = e.target.value.trim();
      const shouldResetVisibleResults = appState.searchSubmitted || appState.searchLoading || appState.searchResults.length > 0;
      appState.searchQuery = query;
      appState.searchLoading = false;
      appState.searchSubmitted = false;
      appState.searchResults = [];

      if (!query || shouldResetVisibleResults) {
        render();
      } else {
        syncSearchActionButton();
      }
    }

    function syncSearchActionButton() {
      const button = document.getElementById('search-action-btn');
      if (!button) return;

      const dict = i18n[appState.lang];
      const showSearchResults = appState.searchQuery && appState.searchSubmitted;
      button.classList.toggle('hidden', !appState.searchQuery);
      button.innerText = showSearchResults ? dict.clear_btn : dict.search_btn;
      button.onclick = showSearchResults ? clearSearch : handleSearchSubmit;
    }

    function handleSearchKeydown(event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      handleSearchSubmit();
    }

    function handleSearchSubmit() {
      const input = document.getElementById('search-input');
      const query = input ? input.value.trim() : appState.searchQuery.trim();
      appState.searchQuery = query;

      if (!query) {
        appState.searchLoading = false;
        appState.searchSubmitted = false;
        appState.searchResults = [];
        render();
        return;
      }

      const token = ++searchRequestToken;
      appState.searchLoading = true;
      appState.searchSubmitted = true;
      appState.searchResults = [];
      render();
      searchStocks(query, token).catch(() => {});
    }

    async function searchStocks(query, token) {
      let matches = [];
      try {
        const currentCodes = appState.watchlist.map(s => s.code);
        matches = (await traceRequest(
          `StockApi.stocks.auto.searchStocks(${query})`,
          { query },
          () => stocks.auto.searchStocks(query)
        ))
          .filter(stock => stock && stock.code && !currentCodes.includes(stock.code))
          .slice(0, 8);
      } catch (error) {
        matches = [];
      }

      if (token !== searchRequestToken) {
        return;
      }

      appState.searchLoading = false;
      appState.searchSubmitted = true;
      appState.searchResults = matches;
      render();
    }

    function clearSearch() {
      searchRequestToken++;
      appState.searchQuery = '';
      appState.searchLoading = false;
      appState.searchSubmitted = false;
      appState.searchResults = [];
      render();
    }

    function normalizeStockCode(code) {
      return String(code || '').trim().toUpperCase();
    }

    function getRouteCode() {
      return normalizeStockCode(new URLSearchParams(window.location.search).get('code'));
    }

    function getExampleBasePath() {
      return window.location.pathname.replace(/\/index\.html$/, '/');
    }

    function getStockDetailHref(code) {
      const url = new URL(window.location.href);
      url.pathname = getExampleBasePath();
      url.search = '';
      url.searchParams.set('code', normalizeStockCode(code));
      url.hash = '';
      return `${url.pathname}${url.search}`;
    }

    function updateRouteCode(code, replace = false) {
      const url = new URL(window.location.href);
      const normalizedCode = normalizeStockCode(code);

      if (normalizedCode) {
        url.searchParams.set('code', normalizedCode);
      } else {
        url.searchParams.delete('code');
      }

      const nextUrl = `${url.pathname}${url.search}${url.hash}`;
      const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
      if (nextUrl === currentUrl) return;

      const method = replace ? 'replaceState' : 'pushState';
      window.history[method]({}, '', nextUrl);
    }

    async function ensureWatchStock(code) {
      const normalizedCode = normalizeStockCode(code);
      if (!normalizedCode || appState.watchlist.some(s => s.code === normalizedCode)) return;

      try {
        appState.watchlist.unshift(await fetchQuote(normalizedCode));
      } catch (error) {
        appState.watchlist.unshift(createWatchStock(normalizedCode));
      }

      savePersistedState();
    }

    async function addStockFromCatalog(code) {
      const normalizedCode = normalizeStockCode(code);
      if (!normalizedCode || appState.watchlist.some(s => s.code === normalizedCode)) return;

      try {
        appState.watchlist.unshift(await fetchQuote(normalizedCode));
      } catch (error) {
        appState.watchlist.unshift(createWatchStock(normalizedCode));
      }

      savePersistedState();
      appState.searchQuery = '';
      appState.searchLoading = false;
      appState.searchSubmitted = false;
      appState.searchResults = [];
      
      const searchInput = document.getElementById('search-input');
      if (searchInput) searchInput.value = '';
      render();
    }

    function removeStock(code, event) {
      if (event) event.stopPropagation(); 
      appState.watchlist = appState.watchlist.filter(s => s.code !== code);
      if (appState.selectedStock === code) {
        appState.selectedStock = appState.watchlist[0]?.code || 'SH510500';
      }
      savePersistedState();
      render();
    }

    function showWatchlist() {
      if (appState.detailOpenedFromList && getRouteCode()) {
        appState.detailOpenedFromList = false;
        window.history.back();
        return;
      }

      appState.detailOpenedFromList = false;
      appState.currentView = 'list';
      updateRouteCode('', true);
      render();
    }

    function viewStockDetails(code, event) {
      const normalizedCode = normalizeStockCode(code);
      if (!normalizedCode) return;

      if (event && (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button === 1)) {
        return;
      }

      if (event) event.preventDefault();
      appState.detailOpenedFromList = true;
      appState.selectedStock = normalizedCode;
      appState.currentView = 'details';
      updateRouteCode(normalizedCode);
      savePersistedState();
      render();
    }

    async function applyRouteState(replace = true) {
      const routeCode = getRouteCode();
      if (!routeCode) {
        appState.detailOpenedFromList = false;
        appState.currentView = 'list';
        return;
      }

      appState.detailOpenedFromList = false;
      appState.selectedStock = routeCode;
      appState.currentView = 'details';
      updateRouteCode(routeCode, replace);
      await ensureWatchStock(routeCode);
      savePersistedState();
    }

    window.addEventListener('popstate', () => {
      applyRouteState(false)
        .catch(() => {})
        .finally(() => render());
    });

    function renderDataSourceAlert() {
      if (!appState.dataSourceError) return '';

      return `
        <div class="rounded-xl border border-amber-500/20 bg-amber-500/10 px-4 py-3 text-xs font-sans text-amber-600 dark:text-amber-300 flex items-start gap-2">
          <span class="mt-0.5 h-2 w-2 rounded-full bg-amber-400 shrink-0"></span>
          <span>${appState.dataSourceError}</span>
        </div>
      `;

    // Interactive K-Line Canvas Engine
    let canvas, ctx;
    let klineData = [];
    let crosshairIndex = -1;

    function changePeriod(p) {
      appState.activePeriod = normalizePeriod(p);
      savePersistedState();
      render();
    }

    async function initChartEngine() {
      canvas = document.getElementById('kline-canvas');
      if (!canvas) return;

      ctx = canvas.getContext('2d');
      klineData = await fetchKlineData(appState.selectedStock, appState.activePeriod);

      if (klineData.length === 0) {
        klineData = generateHistoricalData(appState.selectedStock, appState.activePeriod);
      }

      renderXAxisOverlay();
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      canvas.addEventListener('mousemove', handleCanvasMouseMove);
      canvas.addEventListener('mouseleave', handleCanvasMouseLeave);
      canvas.addEventListener('touchmove', handleCanvasTouchMove);
      canvas.addEventListener('touchend', handleCanvasMouseLeave);

      drawChart();
    }

    function resizeCanvas() {
      if (!canvas) return;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      drawChart();
    }

    function handleCanvasMouseMove(e) {
      if (!canvas || klineData.length === 0) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      
      const plotWidth = rect.width - 65; 
      const candleWidth = plotWidth / klineData.length;
      
      let index = Math.floor(x / candleWidth);
      if (index >= 0 && index < klineData.length) {
        crosshairIndex = index;
      } else {
        crosshairIndex = -1;
      }
      drawChart();
    }

    function handleCanvasTouchMove(e) {
      if (e.touches.length > 0) {
        handleCanvasMouseMove(e.touches[0]);
      }
    }

    function handleCanvasMouseLeave() {
      crosshairIndex = -1;
      drawChart();
    }

    function formatKlineAxisDate(date) {
      const locale = appState.lang === 'zh' ? 'zh-CN' : 'en-US';
      if (appState.activePeriod === 'Month') {
        return date.toLocaleDateString(locale, { year: '2-digit', month: 'short' });
      }

      return date.toLocaleDateString(locale, { month: 'short', day: 'numeric' });
    }

    function getKlineAxisItems() {
      if (klineData.length === 0) return [];

      const tickCount = Math.min(6, klineData.length);
      const tickStep = Math.max(1, Math.floor((klineData.length - 1) / Math.max(1, tickCount - 1)));
      const tickIndexes = [];

      for (let i = 0; i < klineData.length; i += tickStep) {
        tickIndexes.push(i);
      }

      if (tickIndexes[tickIndexes.length - 1] !== klineData.length - 1) {
        tickIndexes.push(klineData.length - 1);
      }

      return tickIndexes.map(index => ({
        index,
        label: formatKlineAxisDate(klineData[index].time)
      }));
    }

    function renderXAxisOverlay() {
      const axis = document.getElementById('kline-x-axis');
      if (!axis) return;

      axis.innerHTML = getKlineAxisItems()
        .map((item, index, items) => `
          <span class="${index === 0 ? 'text-left' : index === items.length - 1 ? 'text-right' : 'text-center'}">${item.label}</span>
        `)
        .join('');
    }

    function drawChart() {
      if (!canvas || !ctx || klineData.length === 0) return;

      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width / dpr;
      const h = canvas.height / dpr;

      ctx.clearRect(0, 0, w, h);

      const topMargin = 30;
      const rightMargin = 65;
      const bottomMargin = 36;
      const volumeHeight = 70;
      const klineHeight = h - topMargin - bottomMargin - volumeHeight - 15;

      const isDark = document.documentElement.classList.contains('dark');
      const gridColor = isDark ? 'rgba(30, 41, 59, 0.4)' : 'rgba(226, 232, 240, 0.6)';
      const textColor = isDark ? '#64748b' : '#475569';

      const upStyle = `rgb(${getComputedStyle(document.documentElement).getPropertyValue('--color-up').trim()})`;
      const downStyle = `rgb(${getComputedStyle(document.documentElement).getPropertyValue('--color-down').trim()})`;

      let maxPrice = -Infinity;
      let minPrice = Infinity;
      let maxVol = -Infinity;

      for (let i = 0; i < klineData.length; i++) {
        const d = klineData[i];
        if (d.high > maxPrice) maxPrice = d.high;
        if (d.low < minPrice) minPrice = d.low;
        if (d.volume > maxVol) maxVol = d.volume;

        if (d.ma5 && d.ma5 > maxPrice) maxPrice = d.ma5;
        if (d.ma5 && d.ma5 < minPrice) minPrice = d.ma5;
        if (d.ma10 && d.ma10 > maxPrice) maxPrice = d.ma10;
        if (d.ma10 && d.ma10 < minPrice) minPrice = d.ma10;
        if (d.ma20 && d.ma20 > maxPrice) maxPrice = d.ma20;
        if (d.ma20 && d.ma20 < minPrice) minPrice = d.ma20;
      }

      const pricePadding = (maxPrice - minPrice) * 0.05;
      maxPrice += pricePadding;
      minPrice -= pricePadding;

      const plotWidth = w - rightMargin;

      ctx.save();
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.strokeStyle = gridColor;
      ctx.font = '10px monospace';
      ctx.fillStyle = textColor;
      ctx.textAlign = 'left';

      const gridLines = 5;
      for (let i = 0; i <= gridLines; i++) {
        const y = topMargin + (klineHeight / gridLines) * i;
        const val = maxPrice - ((maxPrice - minPrice) / gridLines) * i;

        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(plotWidth, y);
        ctx.stroke();

        ctx.fillText(val.toFixed(2), plotWidth + 8, y + 3);
      }

      ctx.beginPath();
      ctx.moveTo(0, h - bottomMargin - volumeHeight);
      ctx.lineTo(plotWidth, h - bottomMargin - volumeHeight);
      ctx.moveTo(0, h - bottomMargin);
      ctx.lineTo(plotWidth, h - bottomMargin);
      ctx.stroke();
      ctx.restore();

      const scaleY = (p) => topMargin + ((maxPrice - p) / (maxPrice - minPrice)) * klineHeight;
      const scaleVol = (v) => h - bottomMargin - (v / maxVol) * volumeHeight;
      const barWidth = plotWidth / klineData.length;

      for (let i = 0; i < klineData.length; i++) {
        const d = klineData[i];
        const x = i * barWidth + barWidth / 2;
        const candleUp = d.close >= d.open;
        const activeColor = candleUp ? upStyle : downStyle;

        ctx.strokeStyle = activeColor;
        ctx.fillStyle = activeColor;

        ctx.save();
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(x, scaleY(d.high));
        ctx.lineTo(x, scaleY(d.low));
        ctx.stroke();
        ctx.restore();

        const rectY = scaleY(Math.max(d.open, d.close));
        const rectH = Math.max(1, Math.abs(scaleY(d.open) - scaleY(d.close)));
        ctx.fillRect(x - barWidth * 0.35, rectY, barWidth * 0.7, rectH);

        const volY = scaleVol(d.volume);
        const volH = h - bottomMargin - volY;
        ctx.save();
        ctx.fillStyle = candleUp ? upStyle : downStyle;
        ctx.globalAlpha = 0.65;
        ctx.fillRect(x - barWidth * 0.35, volY, barWidth * 0.7, volH);
        ctx.restore();
      }

      const drawMA = (key, color) => {
        ctx.save();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = color;
        ctx.beginPath();
        let active = false;

        for (let i = 0; i < klineData.length; i++) {
          const val = klineData[i][key];
          if (val === null) continue;
          const x = i * barWidth + barWidth / 2;
          const y = scaleY(val);

          if (!active) {
            ctx.moveTo(x, y);
            active = true;
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.stroke();
        ctx.restore();
      };

      drawMA('ma5', '#F59E0B');  
      drawMA('ma10', '#3B82F6'); 
      drawMA('ma20', '#A855F7'); 

      const targetIdx = crosshairIndex !== -1 ? crosshairIndex : klineData.length - 1;
      const activeData = klineData[targetIdx];

      if (activeData) {
        document.getElementById('legend-ma5').innerText = activeData.ma5 ? `MA5: ${activeData.ma5.toFixed(2)}` : 'MA5: --';
        document.getElementById('legend-ma10').innerText = activeData.ma10 ? `MA10: ${activeData.ma10.toFixed(2)}` : 'MA10: --';
        document.getElementById('legend-ma20').innerText = activeData.ma20 ? `MA20: ${activeData.ma20.toFixed(2)}` : 'MA20: --';
      }

      // Draw Interactive Crosshair & Axes Hover tags
      if (crosshairIndex !== -1) {
        const hData = klineData[crosshairIndex];
        const x = crosshairIndex * barWidth + barWidth / 2;

        ctx.save();
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.4)';

        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h - bottomMargin);
        ctx.stroke();

        const hoverY = scaleY(hData.close);
        ctx.beginPath();
        ctx.moveTo(0, hoverY);
        ctx.lineTo(plotWidth, hoverY);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(plotWidth + 4, hoverY - 9, rightMargin - 8, 18);
        ctx.font = '9px monospace';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(hData.close.toFixed(2), plotWidth + rightMargin / 2, hoverY + 3);

        const dateStr = formatKlineAxisDate(hData.time);
        const dateWidth = ctx.measureText(dateStr).width + 12;
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(x - dateWidth / 2, h - bottomMargin + 6, dateWidth, 16);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(dateStr, x, h - bottomMargin + 17);

        ctx.restore();
      } else {
        // Latest price line (Right axis indicator standard)
        const latestPrice = klineData[klineData.length - 1].close;
        const latestY = scaleY(latestPrice);
        
        ctx.save();
        ctx.lineWidth = 1;
        ctx.strokeStyle = latestPrice >= klineData[klineData.length - 1].open ? upStyle : downStyle;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(0, latestY);
        ctx.lineTo(plotWidth, latestY);
        ctx.stroke();
        
        ctx.setLineDash([]);
        ctx.fillStyle = latestPrice >= klineData[klineData.length - 1].open ? upStyle : downStyle;
        ctx.fillRect(plotWidth + 4, latestY - 9, rightMargin - 8, 18);
        ctx.font = '9px monospace';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(latestPrice.toFixed(2), plotWidth + rightMargin / 2, latestY + 3);
        ctx.restore();

      }

      renderXAxisOverlay();
    }

    // Window Init Trigger Entry
    window.onload = async function() {
      initAppVersion();
      initSettings();
      initPersistedState();
      await applyRouteState().catch(() => {});
      await refreshWatchlist().catch(() => {});
      appState.isInitializing = false;
      render();
      startMarketSimulation();
    };
  </script>
</body>
</html>
